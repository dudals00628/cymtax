<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | 조영민세무회계</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f3fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── 로그인 ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b1940, #1a2f6e);
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0b1940;
    }
    .login-logo p {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }
    .login-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2a3560;
      margin-bottom: 8px;
    }
    .login-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #d1d9ea;
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }
    .login-input:focus {
      border-color: #1a2f6e;
      box-shadow: 0 0 0 3px rgba(26,47,110,0.12);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #0b1940;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .login-btn:hover { background: #1a2f6e; transform: scale(1.01); }
    .login-btn:active { transform: scale(0.98); }
    .login-error {
      color: #c0392b;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    /* ── 대시보드 ── */
    #dashboard { display: none; }

    .topbar {
      background: #0b1940;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }
    .topbar-sub {
      color: #9aa8c8;
      font-size: 0.78rem;
      margin-top: 2px;
    }
    .logout-btn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 0.83rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }

    .dashboard-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── 통계 카드 ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid #e8edf5;
      box-shadow: 0 2px 8px rgba(13,31,75,0.06);
    }
    .stat-card .num {
      font-size: 2rem;
      font-weight: 700;
      color: #0b1940;
      line-height: 1;
    }
    .stat-card .label {
      font-size: 0.78rem;
      color: #888;
      margin-top: 6px;
    }
    .stat-card.gold .num { color: #c9a440; }
    .stat-card.green .num { color: #27ae60; }

    /* ── 필터 ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid #d1d9ea;
      font-size: 0.83rem;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      color: #4a5578;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: #0b1940;
      background: #0b1940;
      color: #fff;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0b1940;
      margin-bottom: 16px;
    }

    /* ── 테이블 ── */
    .table-wrap {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8edf5;
      box-shadow: 0 2px 8px rgba(13,31,75,0.06);
      overflow: hidden;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    thead {
      background: #f5f7fc;
      border-bottom: 1px solid #e8edf5;
    }
    th {
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      color: #4a5578;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f3fa;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-done { background: #d1f2e0; color: #1a7a40; }

    .status-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      font-weight: 600;
      border: none;
      transition: all 0.2s;
    }
    .status-btn.to-done {
      background: #e8f5e9;
      color: #1a7a40;
    }
    .status-btn.to-done:hover { background: #27ae60; color: #fff; }
    .status-btn.to-pending {
      background: #fff3e0;
      color: #e65100;
    }
    .status-btn.to-pending:hover { background: #e65100; color: #fff; }

    .situation-cell {
      max-width: 200px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #555;
      font-size: 0.83rem;
    }

    .loading {
      text-align: center;
      padding: 48px;
      color: #888;
      font-size: 0.9rem;
    }
    .empty {
      text-align: center;
      padding: 48px;
      color: #aaa;
    }

    /* ── 상세 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal-card {
      background: #fff;
      border-radius: 16px;
      padding: 36px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0b1940;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: #888;
    }
    .modal-row {
      display: flex; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f3fa;
      font-size: 0.88rem;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-key { color: #666; min-width: 80px; font-weight: 500; }
    .modal-val { color: #1a1a2e; flex: 1; word-break: break-all; }

    @media (max-width: 600px) {
      .topbar { padding: 14px 16px; }
      .dashboard-body { padding: 20px 12px; }
      th, td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>조영민세무회계</h1>
      <p>관리자 페이지</p>
    </div>
    <label class="login-label" for="pw">비밀번호</label>
    <input
      class="login-input"
      type="password"
      id="pw"
      placeholder="비밀번호를 입력하세요"
      onkeydown="if(event.key==='Enter') doLogin()"
      autocomplete="current-password"
    />
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<!-- ══ 대시보드 ══ -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <div class="topbar-title">조영민세무회계 — 관리자</div>
      <div class="topbar-sub">상담 신청 관리</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="dashboard-body">
    <!-- 통계 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="label">총 신청 수</div>
      </div>
      <div class="stat-card gold">
        <div class="num" id="stat-pending">—</div>
        <div class="label">대기 중</div>
      </div>
      <div class="stat-card green">
        <div class="num" id="stat-done">—</div>
        <div class="label">상담 완료</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-today">—</div>
        <div class="label">오늘 신청</div>
      </div>
    </div>

    <!-- 필터 -->
    <div class="section-title">상담 신청 목록</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">대기 중</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
      <button class="filter-btn" style="margin-left:auto;" onclick="loadData()">🔄 새로고침</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>연락처</th>
            <th>이메일</th>
            <th>서비스</th>
            <th>상황 설명</th>
            <th>신청 시간</th>
            <th>상태</th>
            <th>상세</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="8" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ══ 상세 모달 ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <div class="modal-title">
      상담 상세 내용
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  // ── 설정
  const ADMIN_PW  = '1영민!@#';
  const SESSION_KEY = 'cymtax_admin_auth';
  const SUPABASE_URL = 'https://icqrdantloxywiiofquj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljcXJkYW50bG94eXdpaW9mcXVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNzczMDYsImV4cCI6MjA5MTY1MzMwNn0.ARmolyHM7NOCWlfDmQAkjLbzYXBbGit9ofmiNpBiOb4';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allData = [];
  let currentFilter = 'all';

  // ── 로그인
  function doLogin() {
    const pw = document.getElementById('pw').value;
    if (pw === ADMIN_PW) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }

  // ── 로그아웃
  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  }

  // ── 세션 확인
  if (sessionStorage.getItem(SESSION_KEY)) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }

  // ── 데이터 불러오기
  async function loadData() {
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="8" class="loading">불러오는 중...</td></tr>';
    try {
      const { data, error } = await sb
        .from('consultations')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      allData = data || [];
      updateStats();
      renderTable();
    } catch(e) {
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="8" class="empty">데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</td></tr>';
    }
  }

  // ── 통계
  function updateStats() {
    const total   = allData.length;
    const pending = allData.filter(r => r.status === 'pending').length;
    const done    = allData.filter(r => r.status === 'done').length;
    const today   = allData.filter(r => {
      const d = new Date(r.created_at);
      const now = new Date();
      return d.toDateString() === now.toDateString();
    }).length;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-today').textContent   = today;
  }

  // ── 필터
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  // ── 테이블 렌더
  function renderTable() {
    const filtered = currentFilter === 'all'
      ? allData
      : allData.filter(r => r.status === currentFilter);

    if (filtered.length === 0) {
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="8" class="empty">신청 내역이 없습니다.</td></tr>';
      return;
    }

    const rows = filtered.map(r => {
      const date = new Date(r.created_at).toLocaleString('ko-KR', { timeZone:'Asia/Seoul' });
      const isPending = r.status === 'pending';
      return `
        <tr>
          <td style="font-weight:600;">${esc(r.name)}</td>
          <td><a href="tel:${esc(r.phone)}" style="color:#0b1940;text-decoration:none;">${esc(r.phone)}</a></td>
          <td style="color:#555;">${esc(r.email || '—')}</td>
          <td>${esc(r.service)}</td>
          <td class="situation-cell">${esc(r.situation)}</td>
          <td style="color:#888;font-size:0.8rem;white-space:nowrap;">${date}</td>
          <td>
            <span class="badge ${isPending ? 'badge-pending' : 'badge-done'}">
              ${isPending ? '대기 중' : '완료'}
            </span>
          </td>
          <td>
            <button
              class="status-btn ${isPending ? 'to-done' : 'to-pending'}"
              onclick="toggleStatus('${r.id}', '${r.status}')"
            >${isPending ? '완료 처리' : '대기로 변경'}</button>
            &nbsp;
            <button
              class="status-btn"
              style="background:#f0f3fa;color:#444;"
              onclick="showModal('${r.id}')"
            >상세</button>
          </td>
        </tr>
      `;
    }).join('');
    document.getElementById('table-body').innerHTML = rows;
  }

  // ── 상태 변경
  async function toggleStatus(id, current) {
    const next = current === 'pending' ? 'done' : 'pending';
    try {
      const { error } = await sb
        .from('consultations')
        .update({ status: next })
        .eq('id', id);
      if (error) throw error;
      // 로컬 데이터 업데이트
      allData = allData.map(r => r.id === id ? { ...r, status: next } : r);
      updateStats();
      renderTable();
    } catch(e) {
      alert('상태 변경에 실패했습니다.');
    }
  }

  // ── 상세 모달
  function showModal(id) {
    const r = allData.find(d => d.id === id);
    if (!r) return;
    const date = new Date(r.created_at).toLocaleString('ko-KR', { timeZone:'Asia/Seoul' });
    document.getElementById('modal-content').innerHTML = `
      <div class="modal-row"><span class="modal-key">이름</span><span class="modal-val">${esc(r.name)}</span></div>
      <div class="modal-row"><span class="modal-key">연락처</span><span class="modal-val">${esc(r.phone)}</span></div>
      <div class="modal-row"><span class="modal-key">이메일</span><span class="modal-val">${esc(r.email || '—')}</span></div>
      <div class="modal-row"><span class="modal-key">서비스</span><span class="modal-val">${esc(r.service)}</span></div>
      <div class="modal-row"><span class="modal-key">상황 설명</span><span class="modal-val" style="white-space:pre-wrap;">${esc(r.situation)}</span></div>
      <div class="modal-row"><span class="modal-key">신청 시간</span><span class="modal-val">${date}</span></div>
      <div class="modal-row"><span class="modal-key">상태</span><span class="modal-val">${r.status === 'pending' ? '대기 중' : '완료'}</span></div>
    `;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── XSS 방지
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
